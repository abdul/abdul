name: Metrics

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Main Profile Card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: abdul
          filename: metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Kolkata

      - name: Calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: abdul
          filename: calendar.svg
          base: ""
          plugin_isocalendar: yes

      - name: Stars
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: abdul
          filename: stars.svg
          base: repositories
          plugin_stars: yes

      - name: Topics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: abdul
          filename: topics.svg
          base: ""
          plugin_topics: yes
          plugin_topics_limit: 30

      # Custom generator (runs last): counts ALL owned repos (public + private)
      # via the GraphQL languages connection. lowlighter/metrics cannot see
      # private code — its in-depth analyzer reads the public events feed only.
      # Earlier steps commit their SVGs via the API, so rebase before pushing.
      - name: Languages (public + private)
        env:
          GH_TOKEN: ${{ secrets.METRICS_TOKEN }}
        run: |
          python3 scripts/generate_languages_svg.py
          if [ -n "$(git status --porcelain languages.svg)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add languages.svg
            git commit -m "Update languages.svg - [Skip GitHub Action]"
            git pull --rebase --autostash origin main
            git push
          fi
